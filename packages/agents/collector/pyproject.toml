[project]
name = "collector"
version = "0.1.0"
description = "天気データ分析AIエージェント - 収集エージェント（Step 1）"
requires-python = ">=3.12"
dependencies = [
    "strands-agents>=0.1",
    "httpx>=0.27",
    "shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collector"]
